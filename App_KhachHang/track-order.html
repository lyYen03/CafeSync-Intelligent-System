<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo dõi đơn hàng - CaféSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/track.css">
</head>

<body class="bg-light">

    <nav class="navbar bg-white shadow-sm p-3">
        <div class="container">
            <a class="text-decoration-none text-dark fw-bold" href="index.html">
                <i class="bi bi-arrow-left"></i> Quay lại Menu
            </a>
            <span class="fw-bold" style="color: #6f4e37;">Trạng thái đơn hàng</span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="m-0 text-muted">Mã đơn hàng:</h6>
                <span class="fw-bold text-dark" id="order-id-display">#Đang tải...</span>
            </div>
            <div class="text-center py-4">
                <h4 class="fw-bold mb-2" id="status-text">Đang kiểm tra...</h4>
                <p class="small text-muted">Tự động cập nhật sau mỗi 10 giây</p>
            </div>

            <div class="step-container d-flex justify-content-between mt-3">
                <div class="step-line"></div>
                <div id="progress-bar" class="step-line-progress"></div>

                <div class="step-item" id="step-1">
                    <div class="step-icon"><i class="bi bi-receipt"></i></div>
                    <div class="step-label">Đã nhận</div>
                </div>
                <div class="step-item" id="step-2">
                    <div class="step-icon"><i class="bi bi-cup-hot"></i></div>
                    <div class="step-label">Pha chế</div>
                </div>
                <div class="step-item" id="step-3">
                    <div class="step-icon"><i class="bi bi-check-circle-fill"></i></div>
                    <div class="step-label">Hoàn thành</div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h6 class="fw-bold mb-3">Chi tiết đơn hàng</h6>
            <div id="order-details-list"></div>
            <hr>
            <div class="d-flex justify-content-between fw-bold">
                <span>Tổng cộng:</span>
                <span id="total-price-display">0đ</span>
            </div>
        </div>
    </div>

    <script src="js/track-logic.js"></script>
</body>

</html>
