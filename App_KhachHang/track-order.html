<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo dõi đơn hàng - CaféSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/track.css">
</head>

<body class="bg-light">

    <nav class="navbar bg-white shadow-sm p-3 sticky-top">
        <div class="container">
            <a class="text-decoration-none text-dark fw-bold back-to-menu" href="index.html">
                <i class="bi bi-arrow-left"></i> Quay lại Menu
            </a>
            <span class="fw-bold nav-title">Trạng thái đơn hàng</span>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="m-0 text-muted small fw-bold">Mã đơn hàng:</h6>
                <span class="fw-bold text-dark" id="order-id-display">#Đang tải...</span>
            </div>

            <div class="text-center py-4">
                <h4 class="fw-bold mb-2 status-text-main" id="status-text">Đang kiểm tra...</h4>
                <p class="small text-muted update-note">
                    <i class="bi bi-arrow-repeat me-1"></i> Tự động cập nhật sau mỗi 10 giây
                </p>
            </div>

            <div class="position-relative mt-3 px-2">
                <div class="step-container d-flex justify-content-between position-relative">
                    <div class="step-line-background"></div>
                    <div id="progress-bar" class="step-line-progress"></div>

                    <div class="step-item" id="step-1">
                        <div class="step-icon"><i class="bi bi-receipt fs-5"></i></div>
                        <div class="step-label">Đã nhận</div>
                    </div>

                    <div class="step-item" id="step-2">
                        <div class="step-icon"><i class="bi bi-cup-hot fs-5"></i></div>
                        <div class="step-label">Pha chế</div>
                    </div>

                    <div class="step-item" id="step-3">
                        <div class="step-icon"><i class="bi bi-check-circle-fill fs-5"></i></div>
                        <div class="step-label">Hoàn thành</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h6 class="fw-bold mb-4 text-dark"><i class="bi bi-list-ul me-2"></i>Chi tiết đơn hàng</h6>

            <div id="order-details-list">
                <div class="text-center py-3">
                    <div class="spinner-border spinner-border-sm text-secondary"></div>
                </div>
            </div>

            <hr class="my-4 opacity-25">

            <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold text-secondary">Tổng cộng</span>
                <span class="fw-bold fs-4 order-total" id="total-price-display">0đ</span>
            </div>
        </div>
    </div>

    <script src="js/track-logic.js"></script>
</body>

</html>
