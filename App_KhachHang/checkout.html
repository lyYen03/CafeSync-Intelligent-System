<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - CaféSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Thêm hiệu ứng cho nút khi nhấn */
        #btn-place-order:active {
            transform: scale(0.98);
            transition: 0.1s;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar shadow-sm p-3" style="background-color: var(--raw-umber) !important;">
        <div class="container">
            <a class="text-decoration-none text-white fw-bold" href="cart.html">
                <i class="bi bi-arrow-left me-1"></i> Quay lại giỏ hàng
            </a>
            <span class="fw-bold text-white">Xác nhận đơn hàng</span>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div class="row g-4">
            <div class="col-md-7">
                <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-geo-alt me-2"></i>Hình thức nhận hàng</h5>

                    <div id="manual-info">
                        <div class="mb-3">
                            <label for="delivery-type" class="form-label small fw-bold">Chọn hình thức:</label>
                            <select class="form-select rounded-3 shadow-none border-light-subtle" id="delivery-type"
                                name="order-type">
                                <option value="at-table">Dùng tại bàn</option>
                                <option value="takeaway">Mang về</option>
                            </select>
                        </div>

                        <div id="table-selection" class="mb-3">
                            <label for="table-number" class="form-label small fw-bold">Số bàn của bạn:</label>
                            <select class="form-select rounded-3 shadow-none border-light-subtle" id="table-number"
                                name="table-number">
                                <option value="">-- Chọn bàn trống --</option>
                                <option value="1">Bàn số 1</option>
                                <option value="2">Bàn số 2</option>
                                <option value="3">Bàn số 3</option>
                                <option value="4">Bàn số 4</option>
                                <option value="5">Bàn số 5</option>
                            </select>
                            <div class="form-text text-muted small" style="font-size: 0.7rem;">
                                * Nếu bạn quét QR tại bàn, số bàn sẽ tự động được chọn.
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-5">
                <div class="card border-0 shadow-sm rounded-4 p-4 sticky-md-top" style="top: 100px;">
                    <h5 class="fw-bold mb-4 text-dark"><i class="bi bi-receipt me-2"></i>Tóm tắt đơn hàng</h5>

                    <div id="order-summary-list" class="mb-3" style="max-height: 300px; overflow-y: auto;"></div>

                    <hr class="text-secondary opacity-25">

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span class="fw-bold fs-5 text-secondary">Tổng thanh toán</span>
                        <span class="fw-bold fs-4" style="color: var(--raw-umber);" id="final-total">0đ</span>
                    </div>

                    <button type="button" id="btn-place-order"
                        class="btn btn-dark w-100 p-3 fw-bold rounded-4 shadow-sm border-0"
                        style="background-color: var(--raw-umber);">
                        ĐẶT HÀNG NGAY
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/checkout.js"></script>

    <script>
        // 1. Logic Ẩn/Hiện phần chọn bàn
        document.getElementById('delivery-type').addEventListener('change', function () {
            const tableSelection = document.getElementById('table-selection');
            if (this.value === 'takeaway') {
                tableSelection.style.display = 'none';
            } else {
                tableSelection.style.display = 'block';
            }
        });

        // 2. Logic tự động nhận diện bàn từ localStorage (Nếu có)
        document.addEventListener('DOMContentLoaded', () => {
            const savedTable = localStorage.getItem('selectedTable');
            const tableSelect = document.getElementById('table-number');
            if (savedTable && tableSelect) {
                tableSelect.value = savedTable;
                console.log(`📍 Đã tự động chọn Bàn số: ${savedTable}`);
            }
        });
    </script>
</body>

</html>
