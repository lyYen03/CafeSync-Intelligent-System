<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán - CaféSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/checkout.css">
</head>

<body>

    <div class="d-flex align-items-center mb-4">
        <a href="cart.html" class="text-dark me-3"><i class="bi bi-arrow-left fs-4"></i></a>
        <h4 class="mb-0 fw-bold">Xác nhận đơn hàng</h4>
    </div>

    <div class="checkout-card">
        <div class="section-title"><i class="bi bi-geo-alt"></i> Hình thức nhận hàng</div>

        <div id="qr-info" class="alert alert-success d-none border-0 mb-0"
            style="background-color: #f0f9f4; border-radius: 12px;">
            <i class="bi bi-check-circle-fill me-2"></i>
            Đã xác nhận: **Bàn số <span id="display-table">--</span>**
        </div>

        <div id="manual-info">
            <select id="delivery-type" class="form-select border-0 bg-light rounded-3 mb-3 p-3 fw-bold">
                <option value="table">Dùng tại bàn (Tại quán)</option>
                <option value="takeaway">Mang đi (Takeaway)</option>
            </select>

            <div id="table-selection">
                <p class="small text-muted mb-2"><i class="bi bi-info-circle"></i> Vui lòng chọn bàn trống hiện có:</p>
                <select id="table-number" class="form-select border-0 bg-light rounded-3 p-3 fw-bold"
                    style="border: 2px solid var(--raw-umber) !important;">
                    <option value="">-- Chọn số bàn --</option>
                </select>
                <div id="table-error" class="text-danger small mt-2 d-none">
                    <i class="bi bi-exclamation-triangle"></i> Bạn chưa chọn số bàn!
                </div>
            </div>
        </div>
    </div>
    <div class="checkout-card">
        <div class="section-title"><i class="bi bi-receipt"></i> Tóm tắt đơn hàng</div>

        <div id="order-summary-list">
        </div>

        <hr style="opacity: 0.1;">
        <div class="d-flex justify-content-between fw-bold fs-5">
            <span>Tổng thanh toán</span>
            <span id="final-total" style="color: var(--raw-umber);">0đ</span>
        </div>
    </div>

    <button class="btn-confirm shadow-lg" onclick="placeOrder()">ĐẶT HÀNG NGAY</button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/checkout.js"></script>
</body>

</html>
