<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaféSync - Đặt món thông minh</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg shadow-sm sticky-top p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold m-0 animate__animated animate__fadeInLeft" href="index.html">
                <i class="bi bi-cup-hot-fill me-1"></i> CaféSync
            </a>

            <div class="d-flex gap-2 align-items-center ms-auto animate__animated animate__fadeInRight">
                <a href="track-order.html" class="btn btn-sm rounded-pill px-3 shadow-sm btn-track-new">
                    <i class="bi bi-truck me-1"></i> <span class="d-none d-sm-inline">Theo dõi</span>
                </a>

                <a href="cart.html" id="cart-btn"
                    class="btn btn-outline-dark position-relative rounded-pill px-3 shadow-sm border-0 bg-transparent">
                    <i class="bi bi-cart3 fs-5 text-white"></i>
                    <span id="cart-count"
                        class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle">0</span>
                </a>

                <button id="user-action-btn"
                    class="btn btn-dark rounded-circle shadow-sm d-flex align-items-center justify-content-center border-0 user-avatar-btn">
                    <i class="bi bi-person-fill"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div
            class="hero-banner p-4 p-md-5 mb-4 rounded-4 shadow-sm text-white overflow-hidden animate__animated animate__fadeIn">
            <div class="col-md-8 px-0">
                <h1 class="display-5 fw-bold mb-3">Khơi nguồn cảm hứng</h1>
                <p id="welcome-msg" class="fs-5 mb-4 opacity-90">Chào bạn! Hôm nay bạn muốn trải nghiệm hương vị nào?
                </p>

                <div class="input-group search-box shadow-sm rounded-pill overflow-hidden bg-white">
                    <input type="text" id="main-search" class="form-control border-0 p-3 shadow-none"
                        placeholder="Tìm món bạn thích...">
                    <button id="search-button" class="btn btn-white px-4 border-0">
                        <i class="bi bi-search text-dark"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="container mt-4 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0">Thực đơn ✨</h4>
        </div>

        <div class="d-flex gap-2 mb-4 overflow-auto pb-2 scrollbar-hidden" id="category-filter">
            <button class="btn btn-dark rounded-pill px-4 fw-bold active" data-category="all">Tất cả</button>
            <button class="btn btn-outline-dark rounded-pill px-4 fw-bold" data-category="Cà Phê">Cà Phê</button>
            <button class="btn btn-outline-dark rounded-pill px-4 fw-bold" data-category="Sinh tố">Sinh tố</button>
            <button class="btn btn-outline-dark rounded-pill px-4 fw-bold" data-category="Nước ép">Nước ép</button>
            <button class="btn btn-outline-dark rounded-pill px-4 fw-bold" data-category="Trà">Trà</button>
        </div>

        <div class="row g-3" id="product-container">
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-secondary" role="status"></div>
            </div>
        </div>
    </div>

    <div id="chat-window" class="card shadow-lg border-0 animate__animated animate__fadeInUp" style="display: none;">
        <div class="card-header d-flex justify-content-between align-items-center text-white chat-header-custom">
            <h6 class="mb-0 fw-bold small"><i class="bi bi-robot me-2"></i>Lisieen AI Tư Vấn</h6>
            <i class="bi bi-x-lg" id="close-chat" style="cursor: pointer;"></i>
        </div>
        <div class="card-body chat-body-custom" id="chat-content">
            <div class="d-flex justify-content-start mb-3">
                <div class="ai-chat-bubble bg-white p-2 rounded-3 shadow-sm border">
                    <strong class="ai-name">Lisieen:</strong> Chào bạn! Mình là trợ lý ảo của CaféSync. Hôm nay bạn thấy
                    thế nào? 😊
                </div>
            </div>
        </div>
        <div class="card-footer bg-white border-0 p-2">
            <div class="input-group">
                <input type="text" id="chat-input"
                    class="form-control rounded-start-pill border-light-subtle shadow-none"
                    placeholder="Nhập yêu cầu...">
                <button class="btn rounded-end-pill btn-add-cart px-3" id="send-chat-btn">
                    <i class="bi bi-send-fill text-white"></i>
                </button>
            </div>
        </div>
    </div>

    <button id="chatbot-btn" class="btn shadow-lg animate__animated animate__bounceIn" aria-label="Mở tư vấn AI">
        <i class="bi bi-chat-dots-fill fs-3"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/ai-chat.js"></script>

    <script>
        // Logic xử lý hiển thị Tên và Đăng xuất ngay tại index
        document.addEventListener('DOMContentLoaded', () => {
            const userName = localStorage.getItem('userName');
            const welcomeMsg = document.getElementById('welcome-msg');
            const userBtn = document.getElementById('user-action-btn');

            if (userName) {
                // Nếu đã đăng nhập: Chào tên thật và đổi icon thành Logout
                welcomeMsg.innerText = `Chào ${userName}! Hôm nay bạn muốn trải nghiệm hương vị nào?`;
                userBtn.innerHTML = '<i class="bi bi-box-arrow-right"></i>';
                userBtn.title = "Đăng xuất";
                userBtn.onclick = () => {
                    if (confirm("Yến muốn đăng xuất khỏi quán à? ☕")) {
                        localStorage.clear();
                        window.location.reload();
                    }
                };
            } else {
                // Nếu chưa đăng nhập: Dẫn về trang login
                userBtn.onclick = () => { window.location.href = 'login.html'; };
            }
        });
    </script>
</body>

</html>
