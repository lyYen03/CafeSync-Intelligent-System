<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - CaféSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/cart.css">
</head>

<body>

    <nav class="navbar shadow-sm sticky-top p-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="back-btn"><i class="bi bi-arrow-left-short"></i></a>
            <h1 class="page-title">Giỏ hàng của bạn</h1>
            <div style="width: 30px;"></div>
        </div>
    </nav>

    <div class="container mt-4 mb-5">
        <div id="cart-list">
            <div class="text-center p-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Đang tải...</span>
                </div>
            </div>
        </div>
    </div>

    <div class="checkout-bar">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <span style="font-weight: 500;">Tổng cộng (3 món):</span>
                <span class="item-price" style="font-size: 1.3rem;">93.000đ</span>
            </div>
            <a href="checkout.html"
                class="btn btn-checkout d-flex align-items-center justify-content-center text-decoration-none">
                Thanh toán ngay <i class="bi bi-arrow-right-circle ms-2"></i>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cart.js"></script>
</body>

</html>
