<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - CaféSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/cart.css">
</head>

<body class="bg-light-custom">

    <nav class="navbar shadow-sm sticky-top bg-white py-3">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="/" class="back-btn-circle">
                <i class="bi bi-chevron-left"></i>
            </a>
            <h1 class="page-title-main">Giỏ hàng của bạn</h1>
            <div style="width: 40px;"></div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="cart-list">
            <div class="empty-cart-wrapper text-center py-5">
                <div class="empty-icon-circle">
                    <i class="bi bi-cart-x"></i>
                </div>
                <h5 class="fw-bold mt-4">Giỏ hàng đang trống</h5>
                <p class="text-muted small">Có vẻ như bạn chưa chọn món nào rồi!</p>
                <a href="/" class="btn btn-go-shop mt-3">Tiếp tục chọn món</a>
            </div>
        </div>

        <div class="cart-spacer"></div>
    </div>

    <div class="checkout-footer">
        <div class="container">
            <div class="price-summary d-flex justify-content-between align-items-center mb-3">
                <span class="text-secondary fw-medium" id="total-count-display">Tổng cộng (0 món)</span>
                <span class="total-money" id="total-money-display">0đ</span>
            </div>

            <button onclick="window.location.href='/checkout'" class="btn-confirm-order w-100 shadow-sm">
                XÁC NHẬN ĐƠN HÀNG <i class="bi bi-arrow-right-short fs-4"></i>
            </button>
        </div>
    </div>

    <script src="/js/cart.js"></script>
</body>

</html>
