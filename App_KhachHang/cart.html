<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giỏ hàng - CaféSync</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
</head>

<body class="bg-light-custom">

    <nav class="navbar shadow-sm sticky-top bg-white py-3">
        <div class="container d-flex align-items-center justify-content-between">
            <a href="index.html" class="back-btn-circle">
                <i class="bi bi-chevron-left"></i>
            </a>
            <h1 class="page-title-main" style="font-size: 1.2rem; font-weight: bold; margin: 0;">Giỏ hàng của bạn</h1>
            <div style="width: 40px;"></div>
        </div>
    </nav>

    <div class="container mt-4">
        <div id="cart-list">
            <div class="text-center py-5">
                <div class="spinner-border text-secondary" role="status"></div>
                <p class="mt-2 text-muted">Đang tải giỏ hàng...</p>
            </div>
        </div>

        <div class="cart-spacer" style="height: 150px;"></div>
    </div>

    <div class="checkout-footer"
        style="position: fixed; bottom: 0; width: 100%; background: white; padding: 20px 0; border-top: 1px solid #eee;">
        <div class="container">
            <div class="price-summary d-flex justify-content-between align-items-center mb-3">
                <span class="text-secondary fw-medium" id="total-count-display">Tổng cộng (0 món)</span>
                <span class="total-money fw-bold text-danger" id="total-money-display"
                    style="font-size: 1.3rem;">0đ</span>
            </div>

            <button onclick="window.location.href='checkout.html'"
                class="btn-confirm-order w-100 shadow-sm btn btn-dark rounded-pill py-3 fw-bold">
                XÁC NHẬN ĐƠN HÀNG <i class="bi bi-arrow-right-short fs-4"></i>
            </button>
        </div>
    </div>

    <script src="js/cart.js"></script>
</body>

</html>
