<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - CaféSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
        }

        .auth-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .nav-pills .nav-link {
            color: #6f4e37;
            font-weight: 600;
            border-radius: 10px;
        }

        .nav-pills .nav-link.active {
            background-color: #6f4e37;
            color: white;
        }

        .btn-auth {
            background-color: #6f4e37;
            color: white;
            border-radius: 10px;
            padding: 12px;
            transition: 0.3s;
        }

        .btn-auth:hover {
            background-color: #5d4037;
            color: white;
            transform: translateY(-2px);
        }

        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 1px solid #eaddcf;
        }

        .form-control:focus {
            border-color: #6f4e37;
            box-shadow: 0 0 0 0.25rem rgba(111, 78, 55, 0.25);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none" style="color: #6f4e37;">
                        <h2 class="fw-bold"><i class="bi bi-cup-hot-fill"></i> CaféSync</h2>
                    </a>
                    <p class="text-muted">Chào mừng Yến quay trở lại!</p>
                </div>

                <div class="card auth-card p-4">
                    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill"
                                data-bs-target="#pills-login">Đăng nhập</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill"
                                data-bs-target="#pills-register">Đăng ký</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="pills-tabContent">
                        <div class="tab-pane fade show active" id="pills-login">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Email hoặc Số điện thoại</label>
                                    <input type="text" class="form-control" id="loginUser"
                                        placeholder="Nhập tài khoản..." required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Mật khẩu</label>
                                    <input type="password" class="form-control" id="loginPass" placeholder="••••••••"
                                        required>
                                </div>
                                <div class="text-end mb-3">
                                    <a href="#" class="small text-decoration-none" style="color: #6f4e37;">Quên mật
                                        khẩu?</a>
                                </div>
                                <button type="submit" class="btn btn-auth w-100 fw-bold shadow-sm">ĐĂNG NHẬP
                                    NGAY</button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="pills-register">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Họ và Tên</label>
                                    <input type="text" class="form-control" placeholder="Lý Thị Yến" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Email</label>
                                    <input type="email" class="form-control" placeholder="yen@example.com" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Mật khẩu mới</label>
                                    <input type="password" class="form-control" placeholder="••••••••" required>
                                </div>
                                <button type="submit" class="btn btn-auth w-100 fw-bold shadow-sm">TẠO TÀI
                                    KHOẢN</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="index.html" class="text-muted small text-decoration-none">← Quay về trang chủ</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Xử lý Logic Đăng nhập (Tài sẽ viết API xử lý sau)
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('loginUser').value;
            // Giả lập lưu User vào LocalStorage
            localStorage.setItem('currentUser', JSON.stringify({ name: user, role: 'customer' }));
            alert("Chào " + user + "! Đăng nhập thành công.");
            window.location.href = "index.html";
        };
    </script>
</body>

</html>
