<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tài khoản - CaféSync</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none" style="color: #6f4e37;">
                        <h2 class="fw-bold"><i class="bi bi-cup-hot-fill"></i> CaféSync</h2>
                    </a>
                    <p class="text-muted">Chào mừng bạn quay trở lại!</p>
                </div>

                <div class="card auth-card p-4 shadow-lg border-0 rounded-4">
                    <ul class="nav nav-pills nav-justified mb-4" id="pills-tab" role="tablist">
                        <li class="nav-item">
                            <button class="nav-link active" id="pills-login-tab" data-bs-toggle="pill"
                                data-bs-target="#pills-login">Đăng nhập</button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" id="pills-register-tab" data-bs-toggle="pill"
                                data-bs-target="#pills-register">Đăng ký</button>
                        </li>
                    </ul>

                    <div class="tab-content" id="pills-tabContent">
                        <div class="tab-pane fade show active" id="pills-login">
                            <form id="loginForm">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Email</label>
                                    <input type="email" class="form-control" id="loginUser"
                                        placeholder="Nhập email của bạn..." required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Mật khẩu</label>
                                    <input type="password" class="form-control" id="loginPass" placeholder="••••••••"
                                        required>
                                </div>
                                <button type="submit" class="btn btn-auth w-100 fw-bold py-3 mt-2">ĐĂNG NHẬP
                                    NGAY</button>
                            </form>
                        </div>

                        <div class="tab-pane fade" id="pills-register">
                            <form id="registerForm">
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Họ và Tên</label>
                                    <input type="text" class="form-control" id="regName" placeholder="Nhập họ tên..."
                                        required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Email</label>
                                    <input type="email" class="form-control" id="regEmail"
                                        placeholder="email@example.com" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label small fw-bold">Mật khẩu mới</label>
                                    <input type="password" class="form-control" id="regPass" placeholder="••••••••"
                                        required>
                                </div>
                                <button type="submit" class="btn btn-auth w-100 fw-bold py-3 mt-2">TẠO TÀI
                                    KHOẢN</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-4">
                    <a href="index.html" class="text-muted small text-decoration-none">← Quay về trang chủ</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
